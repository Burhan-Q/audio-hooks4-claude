# Claude Code Sound Hook Configuration
# ======================================
# Each top-level key is a hook event name. Configure a sound_file to play when that event fires.
# Events with no sound_file (or commented out) are silently skipped.
#
# Options per event:
#   sound_file: /path/to/audio/file    # required - path to sound file
#   loop: true|false                   # optional (default: false) - enable looping
#   repeat: N                          # optional - play N times (only when loop: true, no 'until')
#   until: EventName                   # optional - loop until this event fires (only when loop: true)
#   volume: 0.0-1.0                    # optional (default: 1.0) - playback volume (per-event override)
#
# Precedence:
#   loop: false        → play once, ignore repeat and until
#   loop: true + until → loop until that event fires (repeat is ignored)
#   loop: true + repeat (no until) → play exactly N times
#   loop: true (no repeat, no until) → loop forever
#
# Player auto-detection order: afplay (macOS) > mpv > ffplay > paplay > aplay
# Override with the 'player' key below.

player: auto  # auto | afplay | mpv | ffplay | paplay | aplay
volume: 0.5   # global default volume (0.0 = silent, 1.0 = full) -- per-event volume overrides this

